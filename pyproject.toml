[tool.black]
target-version = ['py310']

[tool.isort]
profile = 'black'

[tool.pytest.ini_options]
pythonpath = [
    ".",
    "test/stubs",
]
markers = [
    "ollama: tests that require a running Ollama instance (deselected by default)",
]
addopts = "-m 'not ollama'"

[tool.pyright]
reportSelfClsParameterName = false

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "requests>=2.33.1",
]
